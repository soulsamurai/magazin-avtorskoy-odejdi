<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — ATELIER</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Шапка -->
  <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md shadow-sm z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16 md:h-20">
        <a href="index.html" class="flex items-center gap-2">
          <svg class="w-8 h-8 text-emerald-700" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="text-xl md:text-2xl font-bold tracking-tight text-gray-900">ATELIER</span>
        </a>
        <nav class="hidden md:flex items-center gap-8">
          <a href="index.html" class="nav-link text-sm font-medium text-gray-600 hover:text-emerald-700 transition-colors">Главная</a>
          <a href="catalog.html" class="nav-link text-sm font-medium text-gray-600 hover:text-emerald-700 transition-colors">Каталог</a>
          <a href="about.html" class="nav-link text-sm font-medium text-gray-600 hover:text-emerald-700 transition-colors">О нас</a>
          <a href="contacts.html" class="nav-link text-sm font-medium text-gray-600 hover:text-emerald-700 transition-colors">Контакты</a>
          <a href="cart.html" class="nav-link relative text-gray-600 hover:text-emerald-700 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            <span class="cart-counter absolute -top-2 -right-2 bg-emerald-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold" style="display:none;">0</span>
          </a>
        </nav>
        <div class="flex items-center gap-4 md:hidden">
          <a href="cart.html" class="relative text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            <span class="cart-counter absolute -top-2 -right-2 bg-emerald-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold" style="display:none;">0</span>
          </a>
          <button id="mobile-menu-btn" class="text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden pb-4 border-t border-gray-100">
        <nav class="flex flex-col gap-2 pt-3">
          <a href="index.html" class="nav-link px-3 py-2 rounded-lg text-gray-600 hover:bg-emerald-50 hover:text-emerald-700">Главная</a>
          <a href="catalog.html" class="nav-link px-3 py-2 rounded-lg text-gray-600 hover:bg-emerald-50 hover:text-emerald-700">Каталог</a>
          <a href="about.html" class="nav-link px-3 py-2 rounded-lg text-gray-600 hover:bg-emerald-50 hover:text-emerald-700">О нас</a>
          <a href="contacts.html" class="nav-link px-3 py-2 rounded-lg text-gray-600 hover:bg-emerald-50 hover:text-emerald-700">Контакты</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Основной контент -->
  <main class="pt-24 md:pt-28 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">

      <!-- Хлебные крошки -->
      <nav class="mb-6 text-sm text-gray-500">
        <a href="index.html" class="hover:text-emerald-700">Главная</a>
        <span class="mx-2">→</span>
        <a href="catalog.html" class="hover:text-emerald-700">Каталог</a>
        <span class="mx-2">→</span>
        <span id="breadcrumb-name" class="text-gray-700 font-medium"></span>
      </nav>

      <!-- Карточка товара -->
      <div id="product-detail" class="grid md:grid-cols-2 gap-8 lg:gap-16">
        <!-- Изображение -->
        <div>
          <img id="product-image" src="" alt="" class="product-image-main shadow-lg"
               onerror="this.src='https://via.placeholder.com/600x700/e5e7eb/9ca3af?text=Фото'">
        </div>

        <!-- Информация -->
        <div class="flex flex-col justify-center">
          <span id="product-category" class="text-emerald-700 text-sm font-semibold uppercase tracking-wider mb-2"></span>
          <h1 id="product-name" class="text-3xl md:text-4xl font-bold text-gray-900 mb-4"></h1>
          <p id="product-description" class="text-gray-600 text-lg leading-relaxed mb-6"></p>
          <p id="product-price" class="text-3xl font-bold text-gray-900 mb-8"></p>

          <!-- Выбор размера -->
          <div class="mb-8">
            <p class="text-sm font-semibold text-gray-700 mb-3">Размер:</p>
            <div class="flex gap-3" id="size-selector">
              <button class="size-btn" data-size="XS">XS</button>
              <button class="size-btn" data-size="S">S</button>
              <button class="size-btn selected" data-size="M">M</button>
              <button class="size-btn" data-size="L">L</button>
              <button class="size-btn" data-size="XL">XL</button>
            </div>
          </div>

          <!-- Кнопка в корзину -->
          <button id="add-to-cart-btn"
                  class="bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-4 px-8 rounded-xl text-lg transition-colors flex items-center justify-center gap-3 w-full md:w-auto">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            Добавить в корзину
          </button>

          <!-- Дополнительная информация -->
          <div class="mt-8 border-t border-gray-200 pt-6 space-y-3 text-sm text-gray-500">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              Бесплатная доставка от 5 000 ₽
            </div>
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              Возврат в течение 14 дней
            </div>
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              100% ручная работа
            </div>
          </div>
        </div>
      </div>

      <!-- Похожие товары -->
      <section class="mt-20">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-8">Похожие товары</h2>
        <div id="similar-products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <!-- Заполняется через JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- Футер -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 text-center text-sm">
      <p>&copy; 2024 ATELIER. Все права защищены.</p>
    </div>
  </footer>

  <!-- Скрипты -->
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    let selectedSize = "M";
    let currentProduct = null;

    document.addEventListener("DOMContentLoaded", () => {
      // Получаем ID товара из URL
      const params = new URLSearchParams(window.location.search);
      const productId = parseInt(params.get("id"));

      if (!productId) {
        window.location.href = "catalog.html";
        return;
      }

      currentProduct = PRODUCTS.find(p => p.id === productId);
      if (!currentProduct) {
        window.location.href = "catalog.html";
        return;
      }

      // Заполняем данные товара
      document.title = `${currentProduct.name} — ATELIER`;
      document.getElementById("breadcrumb-name").textContent = currentProduct.name;
      document.getElementById("product-image").src = currentProduct.image;
      document.getElementById("product-image").alt = currentProduct.name;
      document.getElementById("product-category").textContent = CATEGORY_NAMES[currentProduct.category];
      document.getElementById("product-name").textContent = currentProduct.name;
      document.getElementById("product-description").textContent = currentProduct.description;
      document.getElementById("product-price").textContent = formatPrice(currentProduct.price);

      // Выбор размера
      document.getElementById("size-selector").addEventListener("click", (e) => {
        const btn = e.target.closest(".size-btn");
        if (!btn) return;
        document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedSize = btn.dataset.size;
      });

      // Кнопка «Добавить в корзину»
      document.getElementById("add-to-cart-btn").addEventListener("click", () => {
        Cart.addItem(currentProduct, selectedSize);
      });

      // Похожие товары (до 4 из той же категории, исключая текущий)
      const similar = PRODUCTS
        .filter(p => p.category === currentProduct.category && p.id !== currentProduct.id)
        .sort(() => Math.random() - 0.5)
        .slice(0, 4);

      const container = document.getElementById("similar-products");
      similar.forEach(product => {
        container.appendChild(createProductCard(product, true));
      });
    });
  </script>
</body>
</html>
